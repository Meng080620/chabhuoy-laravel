openapi: 3.1.0
info:
  title: Chabhuoy Marketplace API
  version: 1.0.0
  description: >
    Multi-vendor marketplace API. Customers browse a catalogue, cart, and check
    out; vendors manage their products and fulfil their own order lines; admins
    moderate vendors and read platform reports.

    Auth is token-based (Laravel Sanctum). Register or log in to obtain a token,
    then send it as `Authorization: Bearer <token>`. Token abilities are scoped
    by role — a vendor token carries `vendor:manage`, an admin token `*`.
servers:
  - url: http://localhost:8000/api
    description: Local

tags:
  - name: Auth
    description: Registration, login, session.
  - name: Catalogue
    description: Public product and category browsing.
  - name: Cart
    description: The authenticated user's cart.
  - name: Orders
    description: Customer orders and checkout.
  - name: Vendor
    description: Vendor-only product and fulfilment management.
  - name: Admin
    description: Admin-only moderation and reporting.

security:
  - bearerAuth: []

paths:
  /register:
    post:
      tags: [Auth]
      summary: Register a customer and mint a token
      security: []
      description: Rate limited to 6 requests/minute.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, password_confirmation]
              properties:
                name: { type: string, maxLength: 255, example: Jane Buyer }
                email: { type: string, format: email, example: jane@example.com }
                password: { type: string, minLength: 8, example: password123 }
                password_confirmation: { type: string, example: password123 }
      responses:
        '201':
          description: Created; returns the user and a bearer token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /login:
    post:
      tags: [Auth]
      summary: Exchange credentials for a token
      security: []
      description: Rate limited to 5 attempts/minute per email+IP.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
      responses:
        '200':
          description: OK; returns the user and a bearer token.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { $ref: '#/components/responses/TooManyRequests' }

  /logout:
    post:
      tags: [Auth]
      summary: Revoke the current token
      responses:
        '200': { description: Logged out. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /me:
    get:
      tags: [Auth]
      summary: The authenticated user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /products:
    get:
      tags: [Catalogue]
      summary: List active products from active vendors
      security: []
      parameters:
        - { name: category_id, in: query, schema: { type: integer }, description: Filter by category id }
        - { name: vendor_id, in: query, schema: { type: integer } }
        - { name: search, in: query, schema: { type: string }, description: Substring match on name }
        - { name: per_page, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200':
          description: Paginated product list.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Product' }

  /products/{product}:
    get:
      tags: [Catalogue]
      summary: Show one product (by uuid)
      security: []
      parameters:
        - { name: product, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Product' }
        '404':
          description: Not found, inactive, or its vendor is suspended.

  /categories:
    get:
      tags: [Catalogue]
      summary: Category tree (top-level with nested children)
      security: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }

  /categories/{category}:
    get:
      tags: [Catalogue]
      summary: Show one category (by slug)
      security: []
      parameters:
        - { name: category, in: path, required: true, schema: { type: string }, description: Category slug }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Category' }
        '404': { description: No such category. }

  /cart:
    get:
      tags: [Cart]
      summary: Show the current cart
      responses:
        '200': { description: OK }
        '401': { $ref: '#/components/responses/Unauthorized' }
    put:
      tags: [Cart]
      summary: Set the absolute quantity of a product in the cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [product_id, quantity]
              properties:
                product_id: { type: integer, example: 1 }
                quantity: { type: integer, minimum: 1, maximum: 99, example: 2 }
      responses:
        '200': { description: Cart updated. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /cart/{productId}:
    delete:
      tags: [Cart]
      summary: Remove a product from the cart
      parameters:
        - { name: productId, in: path, required: true, schema: { type: integer } }
      responses:
        '200': { description: Removed. }
        '401': { $ref: '#/components/responses/Unauthorized' }

  /orders:
    get:
      tags: [Orders]
      summary: List the customer's orders
      responses:
        '200':
          description: Paginated orders.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Orders]
      summary: Place an order from the cart
      description: >
        Captures payment idempotently and decrements stock atomically. Fails if
        the cart is empty, any line is out of stock (422), a line's vendor is no
        longer active (422), or payment is declined (402).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [payment_method]
              properties:
                payment_method:
                  type: string
                  enum: [card, qr, cod]
      responses:
        '201':
          description: Order placed.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Order' }
                  message: { type: string, example: Order placed successfully. }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '402': { description: Payment failed. }
        '422': { $ref: '#/components/responses/ValidationError' }

  /orders/{order}:
    get:
      tags: [Orders]
      summary: Show one of the customer's orders (by uuid)
      parameters:
        - { name: order, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { description: Not the owner. }

  /vendor/products:
    get:
      tags: [Vendor]
      summary: List the vendor's products
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      tags: [Vendor]
      summary: Create a product
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '201':
          description: Created.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Product' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /vendor/products/{product}:
    put:
      tags: [Vendor]
      summary: Update a product (must own it)
      parameters:
        - { name: product, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ProductInput' }
      responses:
        '200': { description: Updated. }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }
    delete:
      tags: [Vendor]
      summary: Delete a product (must own it)
      parameters:
        - { name: product, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '200': { description: Deleted. }
        '403': { $ref: '#/components/responses/Forbidden' }

  /vendor/orders:
    get:
      tags: [Vendor]
      summary: Orders containing the vendor's items
      description: Each order shows only this vendor's lines.
      responses:
        '200': { description: OK }
        '403': { $ref: '#/components/responses/Forbidden' }

  /vendor/orders/{order}:
    patch:
      tags: [Vendor]
      summary: Advance the vendor's lines on an order
      description: >
        Transitions this vendor's lines to `shipped` or `delivered`. The
        order-level status is a rollup — it only becomes `shipped` once every
        line across all vendors has shipped. 404 if the vendor has no line on
        the order; 422 on an illegal transition (e.g. pending → delivered).
      parameters:
        - { name: order, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [shipped, delivered] }
      responses:
        '200':
          description: Lines updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Order' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { description: Vendor has no line on this order. }
        '422': { $ref: '#/components/responses/ValidationError' }

  /admin/vendors:
    get:
      tags: [Admin]
      summary: List vendors (moderation queue)
      parameters:
        - name: status
          in: query
          schema: { type: string, enum: [pending, active, suspended] }
          description: Filter the approval queue.
        - { name: per_page, in: query, schema: { type: integer, default: 20 } }
      responses:
        '200':
          description: Paginated vendors.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Paginated'
                  - type: object
                    properties:
                      data:
                        type: array
                        items: { $ref: '#/components/schemas/Vendor' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /admin/vendors/{vendor}:
    patch:
      tags: [Admin]
      summary: Approve / suspend / reset a vendor (by uuid)
      description: Suspension takes effect on the vendor's next request.
      parameters:
        - { name: vendor, in: path, required: true, schema: { type: string, format: uuid } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { type: string, enum: [pending, active, suspended] }
      responses:
        '200':
          description: Updated.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Vendor' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /admin/reports/sales:
    get:
      tags: [Admin]
      summary: Platform sales summary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  orders_count: { type: integer }
                  gross_revenue: { type: string, example: '12450.00' }
                  top_vendors: { type: array, items: { type: object } }
                  active_vendors: { type: integer }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Laravel Sanctum personal access token.

  responses:
    Unauthorized:
      description: Missing or invalid token.
    Forbidden:
      description: Authenticated, but the role/ability is not permitted.
    TooManyRequests:
      description: Rate limit exceeded.
    ValidationError:
      description: Validation failed.
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ValidationErrorBody' }

  schemas:
    AuthResponse:
      type: object
      properties:
        user: { $ref: '#/components/schemas/User' }
        token: { type: string, example: 1|abcdef0123456789 }

    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [customer, vendor, admin] }

    Product:
      type: object
      properties:
        id: { type: string, format: uuid, description: Public uuid }
        name: { type: string }
        slug: { type: string }
        description: { type: string, nullable: true }
        price: { type: string, example: '19.99' }
        stock: { type: integer }
        is_active: { type: boolean }
        category: { $ref: '#/components/schemas/Category' }
        vendor: { $ref: '#/components/schemas/Vendor' }

    ProductInput:
      type: object
      required: [name, category_id, price, stock]
      properties:
        name: { type: string, maxLength: 255 }
        category_id: { type: integer }
        description: { type: string, nullable: true }
        price: { type: string, example: '19.99', description: Up to 2 decimals }
        stock: { type: integer, minimum: 0 }
        low_stock_threshold: { type: integer, minimum: 0, nullable: true }
        is_active: { type: boolean }

    Category:
      type: object
      properties:
        id: { type: integer, description: 'Used as the products?category_id filter value' }
        name: { type: string }
        slug: { type: string }
        children:
          type: array
          items: { $ref: '#/components/schemas/Category' }

    Vendor:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        status: { type: string, enum: [pending, active, suspended] }
        payout_balance:
          type: string
          nullable: true
          description: Only present to the owning vendor or an admin.

    Order:
      type: object
      properties:
        id: { type: string, format: uuid }
        status: { type: string, enum: [pending, paid, shipped, delivered, cancelled] }
        status_label: { type: string }
        payment_method: { type: string, enum: [card, qr, cod] }
        total: { type: string, example: '40.00' }
        placed_at: { type: string, format: date-time, nullable: true }
        items:
          type: array
          items: { $ref: '#/components/schemas/OrderItem' }

    OrderItem:
      type: object
      properties:
        product_name: { type: string }
        quantity: { type: integer }
        unit_price: { type: string }
        line_total: { type: string }
        status: { type: string, enum: [pending, shipped, delivered, cancelled] }

    Paginated:
      type: object
      properties:
        data: { type: array, items: {} }
        links: { type: object }
        meta:
          type: object
          properties:
            current_page: { type: integer }
            last_page: { type: integer }
            per_page: { type: integer }
            total: { type: integer }

    ValidationErrorBody:
      type: object
      properties:
        message: { type: string }
        errors:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
