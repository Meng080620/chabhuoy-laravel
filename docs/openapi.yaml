        delivery_fee: { type: string, example: '3.00' }
        cod_amount: { type: string, example: '0.00' }
        otp: { type: string, nullable: true, description: Visible only to the assigned rider when OTP is enabled. }
        proof_photo_url: { type: string, format: uri, nullable: true, description: Visible only to the assigned rider. }
        accepted_at: { type: string, format: date-time, nullable: true }
        picked_up_at: { type: string, format: date-time, nullable: true }
        delivered_at: { type: string, format: date-time, nullable: true }
        order:
          type: object
          nullable: true
        vendor:
          type: object
          nullable: true
          properties:
            id: { type: string, format: uuid }
            name: { type: string }

    DeliveryEarning:
      type: object
      properties:
        id: { type: string, format: uuid }
        amount: { type: string, example: '90.00' }
        status: { type: string, enum: [completed] }
        reference: { type: string, nullable: true, description: 'Disbursement provider id (disb_…).' }
        processed_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    CashSettlement:
      type: object
      properties:
        id: { type: string, format: uuid }
        amount: { type: string, example: '45.00' }
        delivery_man:
          type: object
          nullable: true
        created_at: { type: string, format: date-time }

    Paginated:
      type: object
      properties:
        data: { type: array, items: {} }
